<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Heart Letter</title>
    <style>
        :root {
            --primary-pink: #ff6b81;
            --soft-pink: #ffe4e8;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--soft-pink);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
        }

        /* The Main Envelope Card */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background-color: var(--white);
            border: 6px solid var(--primary-pink);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* Keeps the flap from spilling out */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        /* The Flap - Fixed with Z-Index */
        .flap {
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 120px 120px 0;
            border-color: transparent var(--primary-pink) transparent transparent;
            z-index: 1; /* Sits behind the text */
            transition: all 0.5s ease;
            opacity: 0.8;
        }

        /* The Text Content - Fixed with Z-Index */
        .content {
            position: relative;
            z-index: 2; /* Sits on top of the flap */
            padding: 20px;
            color: var(--primary-pink);
        }

        .content h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .content p {
            font-size: 16px;
            line-height: 1.4;
            margin: 0;
        }

        .heart {
            display: block;
            margin-top: 10px;
            font-size: 20px;
        }

        /* The Button */
        .open-btn {
            margin-top: 30px;
            padding: 12px 35px;
            background-color: var(--primary-pink);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 129, 0.6);
            background-color: #ff4757;
        }

        .open-btn:active {
            transform: translateY(0);
        }

        /* Animation State */
        .opened .flap {
            transform: translate(50px, -50px) rotate(45px);
            opacity: 0;
        }

        .opened .envelope-wrapper {
            transform: scale(1.05);
            border-color: #ff4757;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="envelope-wrapper">
            <div class="flap"></div>

            <div class="content">
                <h2>Hey there!</h2>
                <p>Just a digital note to say you're doing great. Keep being awesome!</p>
                <span class="heart">❤️</span>
            </div>
        </div>

        <button class="open-btn" onclick="openLetter()">Open Letter</button>
    </div>

    <script>
        function openLetter() {
            const container = document.getElementById('mainContainer');
            container.classList.toggle('opened');
            
            const btn = document.querySelector('.open-btn');
            if(container.classList.contains('opened')) {
                btn.innerHTML = "Close Letter";
            } else {
                btn.innerHTML = "Open Letter";
            }
        }
    </script>

</body>
</html>
