<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Heart Letter</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff758f;
            --paper: #fff5f5;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe5ec;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Heart Rain Animation */
        .heart-particle {
            position: absolute;
            color: var(--primary);
            font-size: 20px;
            top: -20px;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        /* Container for the Letter */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* The Envelope */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background: var(--secondary);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 35px var(--shadow);
            margin-bottom: 30px;
        }

        /* The Top Flap */
        .envelope-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 5;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--primary);
            transform-origin: top;
            transition: transform 0.5s ease-in-out;
        }

        /* Opening Animation Class */
        .envelope-wrapper.open::before {
            transform: rotateX(180deg);
            z-index: 2;
        }

        /* The Hidden Letter */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 15px;
            width: 270px;
            height: 180px;
            background: var(--paper);
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.6s ease-in-out;
            z-index: 3;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-120px);
        }

        .letter h2 { color: var(--primary); margin: 0; }
        .letter p { color: #444; font-size: 14px; line-height: 1.5; }

        /* The Button */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
            outline: none;
            -webkit-tap-highlight-color: transparent; /* Fixes mobile tap gray box */
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper" id="envelope">
            <div class="letter">
                <h2>Hey there!</h2>
                <p>Just a digital note to say you're doing great. Keep being awesome! ❤️</p>
            </div>
        </div>
        
        <button class="btn" onclick="toggleLetter()">OPEN LETTER</button>
    </div>

    <script>
        let heartInterval;

        function toggleLetter() {
            const envelope = document.getElementById('envelope');
            const btn = document.querySelector('.btn');
            
            envelope.classList.toggle('open');

            if (envelope.classList.contains('open')) {
                btn.innerText = "CLOSE LETTER";
                startHearts();
            } else {
                btn.innerText = "OPEN LETTER";
                stopHearts();
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's'; // 3-5 seconds
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            heart.style.opacity = Math.random() * 0.5 + 0.5;
            
            document.body.appendChild(heart);

            // Cleanup
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        function startHearts() {
            heartInterval = setInterval(createHeart, 250);
        }

        function stopHearts() {
            clearInterval(heartInterval);
        }
    </script>
</body>
</html>
